services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
      POSTGRES_DB: scheduler
    ports:
      # Host port 5433 to avoid clashing with a locally installed Postgres.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment: &backend_env
      DATABASE_URL: postgresql+psycopg2://scheduler:scheduler@postgres:5432/scheduler
      JWT_SECRET: dev-secret-change-me
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: ./backend
    command: python -m app.worker
    environment: *backend_env
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      replicas: 2   # scale with: docker compose up --scale worker=4

  scheduler:
    build: ./backend
    command: python -m app.scheduler
    environment: *backend_env
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
